<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagerverwaltung Cloud - Passwortgeschützt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- KONFIGURATION ---
        const MASTER_PASSWORD = "HansZaun"; 
        let db, auth;
        window.inventory = [];
        let currentUser = null;

        // Sicherer Abruf der Konfiguration
        const getFirebaseConfig = () => {
            try {
                return typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            } catch (e) {
                return null;
            }
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lager-v2-secure';

        async function initApp() {
            const isAuthenticated = sessionStorage.getItem('lager_auth_status') === 'success';
            
            if (!isAuthenticated) {
                showLogin(true);
                return;
            }

            const config = getFirebaseConfig();
            if (!config) {
                console.error("Cloud-Konfiguration fehlt.");
                document.getElementById('user-display').innerText = "Offline-Modus (Keine Config)";
                showLogin(false);
                return;
            }

            try {
                const app = initializeApp(config);
                db = getFirestore(app);
                auth = getAuth(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUser = user;
                        document.getElementById('user-display').innerText = `System Status: Online & Autorisiert`;
                        showLogin(false);
                        listenToChanges();
                    }
                });
            } catch (error) {
                console.error("Firebase Fehler:", error);
                showLogin(false);
                document.getElementById('user-display').innerText = "Verbindungsfehler";
            }
        }

        function listenToChanges() {
            if (!db) return;
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
                onSnapshot(colRef, (snapshot) => {
                    window.inventory = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderTable();
                }, (err) => {
                    console.error("Firestore Snapshot Fehler:", err);
                });
            } catch (e) {
                console.error("Listen Error:", e);
            }
        }

        // Login Funktion (Global für Button)
        window.handleLogin = (e) => {
            if(e) e.preventDefault();
            const inputField = document.getElementById('login-id');
            const input = inputField.value;
            const btn = document.getElementById('login-btn');
            
            console.log("Login Versuch..."); // Debugging

            if (input === MASTER_PASSWORD) {
                sessionStorage.setItem('lager_auth_status', 'success');
                initApp();
            } else {
                btn.classList.add('bg-red-600');
                btn.innerText = "Falsches Passwort";
                setTimeout(() => {
                    btn.classList.remove('bg-red-600');
                    btn.innerText = "Freischalten";
                }, 2000);
                inputField.value = "";
            }
        };

        window.logout = () => {
            sessionStorage.removeItem('lager_auth_status');
            location.reload();
        };

        function showLogin(show) {
            const overlay = document.getElementById('login-overlay');
            const content = document.getElementById('main-content');
            if(show) {
                overlay.classList.remove('hidden');
                content.classList.add('hidden');
            } else {
                overlay.classList.add('hidden');
                content.classList.remove('hidden');
            }
        }

        // ... Restliche Funktionen für das UI ...
        window.addPackstueckRow = () => {
            const container = document.getElementById('packstuecke-container');
            const row = document.createElement('div');
            row.className = "grid grid-cols-12 gap-2 mb-2 items-end packstueck-row bg-slate-50 p-2 rounded-lg border border-slate-100";
            row.innerHTML = `
                <div class="col-span-5"><label class="text-[9px] font-bold uppercase text-slate-400">Typ</label>
                    <select class="w-full border-slate-200 bg-white p-2 rounded-lg text-sm pack-typ">
                        <option>Euro-Palette</option><option>Halbpalette</option><option>Einwegpalette</option><option>Karton</option><option>Kiste</option>
                    </select>
                </div>
                <div class="col-span-3"><label class="text-[9px] font-bold uppercase text-slate-400">Anz.</label>
                    <input type="number" required class="w-full border-slate-200 bg-white p-2 rounded-lg text-sm pack-anzahl" value="1">
                </div>
                <div class="col-span-3"><label class="text-[9px] font-bold uppercase text-slate-400">Kg ges.</label>
                    <input type="number" step="0.1" required class="w-full border-slate-200 bg-white p-2 rounded-lg text-sm pack-gewicht">
                </div>
                <div class="col-span-1 text-right"><button type="button" onclick="this.parentElement.parentElement.remove()" class="text-red-400 hover:text-red-600 text-lg">×</button></div>
            `;
            container.appendChild(row);
        };

        window.saveItem = async (e) => {
            e.preventDefault();
            if (!db) return alert("Speichern nicht möglich: Keine Cloud-Verbindung.");

            const rows = document.querySelectorAll('.packstueck-row');
            const packstuecke = Array.from(rows).map(row => ({
                typ: row.querySelector('.pack-typ').value,
                anzahl: parseInt(row.querySelector('.pack-anzahl').value),
                gewicht: parseFloat(row.querySelector('.pack-gewicht').value)
            }));

            const data = {
                firma: document.getElementById('firma').value,
                land: document.getElementById('land').value,
                stadt: document.getElementById('stadt').value,
                plz: document.getElementById('plz').value,
                laderef: document.getElementById('laderef').value,
                datumEin: document.getElementById('datumEin').value,
                datumAus: null,
                packstuecke: packstuecke,
                anzahlGesamt: packstuecke.reduce((a, b) => a + b.anzahl, 0),
                gewichtGesamt: packstuecke.reduce((a, b) => a + b.gewicht, 0),
                status: 'eingelagert',
                createdAt: new Date().toISOString()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
                await addDoc(colRef, data);
                toggleModal(false);
                e.target.reset();
            } catch (err) {
                alert("Fehler beim Speichern.");
            }
        };

        window.renderTable = () => {
            const tableBody = document.getElementById('tableBody');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = window.inventory.filter(i => (i.firma || "").toLowerCase().includes(searchTerm) || (i.laderef || "").toLowerCase().includes(searchTerm));
            
            document.getElementById('stat-count').innerText = window.inventory.filter(i => i.status === 'eingelagert').reduce((a, b) => a + (b.anzahlGesamt || 0), 0);
            document.getElementById('stat-weight').innerText = window.inventory.filter(i => i.status === 'eingelagert').reduce((a, b) => a + (b.gewichtGesamt || 0), 0).toLocaleString('de-DE');

            tableBody.innerHTML = filtered.length ? '' : '<tr><td colspan="9" class="p-10 text-center text-slate-400">Keine Einträge...</td></tr>';
            
            filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(item => {
                const summary = (item.packstuecke || []).reduce((acc, curr) => {
                    acc[curr.typ] = (acc[curr.typ] || 0) + curr.anzahl;
                    return acc;
                }, {});
                const packInfo = Object.entries(summary).map(([typ, anz]) => `${anz}x ${typ}`).join('<br>');
                const row = document.createElement('tr');
                row.className = "border-b border-slate-100 hover:bg-blue-50/30 transition text-sm align-top";
                row.innerHTML = `
                    <td class="p-4 font-mono text-blue-600 font-bold">${item.laderef}</td>
                    <td class="p-4 font-bold text-slate-800">${item.firma}</td>
                    <td class="p-4 text-slate-500">${item.plz} ${item.stadt}</td>
                    <td class="p-4 text-[11px] leading-tight">${packInfo}</td>
                    <td class="p-4 font-semibold">${item.anzahlGesamt}</td>
                    <td class="p-4">${item.gewichtGesamt} kg</td>
                    <td class="p-4 text-slate-400">${item.datumEin}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded-full text-[10px] font-black uppercase ${item.status === 'eingelagert' ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}">${item.status === 'eingelagert' ? 'Im Lager' : 'Raus'}</span></td>
                    <td class="p-4 text-right flex justify-end gap-4 text-xl">
                        ${item.status === 'eingelagert' ? `<button onclick="markAsOut('${item.id}')">📤</button>` : ''}
                        <button onclick="deleteItem('${item.id}')" class="opacity-20 hover:opacity-100 hover:text-red-500">🗑️</button>
                    </td>`;
                tableBody.appendChild(row);
            });
        };

        window.markAsOut = async (id) => {
            const date = prompt("Auslagerungsdatum (JJJJ-MM-TT):", new Date().toISOString().split('T')[0]);
            if (!date || !db) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id), { status: 'ausgelagert', datumAus: date });
        };

        window.deleteItem = async (id) => {
            if(!confirm('Löschen?') || !db) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id));
        };

        window.toggleModal = (show) => {
            document.getElementById('modal').classList.toggle('hidden', !show);
            if(show) {
                document.getElementById('datumEin').valueAsDate = new Date();
                document.getElementById('packstuecke-container').innerHTML = '';
                addPackstueckRow();
            }
        };

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen">
    <div id="login-overlay" class="fixed inset-0 bg-slate-100 z-[100] flex items-center justify-center p-4">
        <form onsubmit="handleLogin(event)" class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-slate-200">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6">🔒</div>
            <h1 class="text-3xl font-black text-slate-800 mb-2 uppercase tracking-tighter">Lager<span class="text-blue-600">Cloud</span></h1>
            <p class="text-slate-400 text-sm mb-8 font-semibold">Passwort: HansZaun</p>
            <input type="password" id="login-id" placeholder="Passwort..." required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-4 text-center text-lg outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-700 transition shadow-lg active:scale-95">Freischalten</button>
        </form>
    </div>

    <div id="main-content" class="hidden">
        <nav class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b p-4 mb-6">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-black text-slate-800 uppercase">Lager<span class="text-blue-600">Cloud</span></h1>
                <p id="user-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></p>
                <div class="flex gap-4">
                    <button onclick="logout()" class="text-[10px] font-bold text-slate-400 hover:text-red-600">Abmelden</button>
                    <button onclick="toggleModal(true)" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ Neu</button>
                </div>
            </div>
        </nav>
        <main class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-slate-400 text-xs font-bold uppercase">Packstücke</p>
                    <h2 id="stat-count" class="text-3xl font-black text-slate-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl border">
                    <p class="text-slate-400 text-xs font-bold uppercase">Gewicht (kg)</p>
                    <h2 id="stat-weight" class="text-3xl font-black text-slate-800">0</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-2xl text-white">
                    <input type="text" id="searchInput" oninput="renderTable()" placeholder="Suchen..." class="w-full bg-slate-700 border-none rounded-lg p-2 text-white">
                </div>
            </div>
            <div class="bg-white rounded-2xl border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b">
                        <tr><th class="p-4">Ref</th><th class="p-4">Firma</th><th class="p-4">Ort</th><th class="p-4">Typen</th><th class="p-4">Stk.</th><th class="p-4">Kg</th><th class="p-4">Ein</th><th class="p-4">Status</th><th class="p-4"></th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-3xl max-w-2xl w-full p-8 my-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Wareneingang</h2>
            <form onsubmit="saveItem(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><input type="text" id="firma" placeholder="Firma" required class="w-full border p-3 rounded-xl bg-slate-50"></div>
                    <input type="text" id="laderef" placeholder="Referenz" required class="w-full border p-3 rounded-xl bg-blue-50 text-blue-600 font-bold">
                    <input type="date" id="datumEin" required class="w-full border p-3 rounded-xl bg-slate-50">
                    <input type="text" id="land" placeholder="Land" required class="w-full border p-3 rounded-xl bg-slate-50">
                    <input type="text" id="stadt" placeholder="Stadt" required class="w-full border p-3 rounded-xl bg-slate-50">
                    <input type="text" id="plz" placeholder="PLZ" required class="w-full border p-3 rounded-xl bg-slate-50">
                </div>
                <div class="border-t pt-4">
                    <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-sm uppercase">Packstücke</h3><button type="button" onclick="addPackstueckRow()" class="text-blue-600 text-xs font-bold">+ Mehr</button></div>
                    <div id="packstuecke-container"></div>
                </div>
                <div class="flex justify-end gap-4 pt-4 border-t">
                    <button type="button" onclick="toggleModal(false)">Abbrechen</button>
                    <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black uppercase text-xs">Speichern</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
